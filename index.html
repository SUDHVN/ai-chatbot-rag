<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; }
        .chat { margin-top: 20px; }
        .user { color: blue; }
        .bot { color: green; margin-bottom: 10px; }
    </style>
</head>
<body>

<h2>AI Chatbot (PDF RAG)</h2>

<input type="file" id="pdfFile">
<button onclick="uploadPDF()">Upload PDF</button>

<div class="chat" id="chatBox"></div>

<input type="text" id="question" placeholder="Ask something">
<button onclick="ask()">Send</button>

<script>
async function uploadPDF() {
    let fileInput = document.getElementById("pdfFile");
    let formData = new FormData();
    formData.append("file", fileInput.files[0]);

    await fetch("/upload", {
        method: "POST",
        body: formData
    });

    alert("PDF uploaded!");
}

async function ask() {
    let question = document.getElementById("question").value;

    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += `<p class="user"><b>You:</b> ${question}</p>`;

    let res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question})
    });

    let data = await res.json();

    chatBox.innerHTML += `<p class="bot"><b>Bot:</b> ${data.answer}</p>`;
}
</script>

</body>
</html>
